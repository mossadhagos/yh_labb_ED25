version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sql-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labdb}
      POSTGRES_USER: ${POSTGRES_USER:-labuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labpass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Persist database data
      - postgres-data:/var/lib/postgresql/data
      # Mount init scripts
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      # Mount custom SQL scripts for practice
      - ./sql-scripts:/sql-scripts:ro
    networks:
      - sql-lab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # pgAdmin - Web-based PostgreSQL administration
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sql-lab-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lab.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - sql-lab-network
    depends_on:
      postgres:
        condition: service_healthy

  # Adminer - Lightweight database management
  adminer:
    image: adminer:latest
    container_name: sql-lab-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - sql-lab-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  sql-lab-network:
    driver: bridge
    name: sql-lab-network

volumes:
  postgres-data:
    name: sql-lab-postgres-data
  pgadmin-data:
    name: sql-lab-pgadmin-data
